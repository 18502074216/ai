<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>林老师的咒语集</title>
    <style>
        :root { --bg: #0B0E14; --card: #151A23; --cyan: #4FD1C5; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .admin-btn { background: var(--cyan); color: #000; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class="nav">
        <h2 onclick="login()" style="cursor:pointer">林老师的咒语集</h2>
        <div id="controls">
            <button id="addBtn" class="admin-btn" onclick="add()">+ 添加</button>
            <button id="expBtn" class="admin-btn" style="background:#fff" onclick="exportData()">导出备份</button>
        </div>
    </div>
    <div id="list" class="grid"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('lin_ai_db')) || [];
        let isAdmin = false;

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = db.length ? '' : '空库，点击标题输入密码（lin888）开始录入';
            db.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${item.img}"><div style="padding:10px">${item.name}</div>
                ${isAdmin ? `<button onclick="del(${i})" style="color:red;background:none;border:none;width:100%;cursor:pointer">删除</button>` : ''}`;
                list.appendChild(div);
            });
        }

        function login() {
            if(prompt("口令") === "lin888") {
                isAdmin = true;
                document.querySelectorAll('.admin-btn').forEach(b => b.style.display = 'inline-block');
                render();
            }
        }

        function add() {
            const name = prompt("项目名");
            const img = prompt("图片地址");
            const p = prompt("提示词");
            if(name && img) { db.push({name, img, p}); save(); }
        }

        function save() { localStorage.setItem('lin_ai_db', JSON.stringify(db)); render(); }
        function del(i) { if(confirm("删？")) { db.splice(i, 1); save(); } }
        
        function exportData() {
            const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'ai_data.json';
            a.click();
        }

        render();
    </script>
</body>
</html>

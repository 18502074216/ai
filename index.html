<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>林老师的提示词库</title>
    <style>
        :root { --bg: #0B0E14; --card: #151A23; --cyan: #4FD1C5; --text: #E2E8F0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        
        /* 顶部导航 */
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #2D3748; margin-bottom: 30px; }
        .logo { border-left: 4px solid var(--cyan); padding-left: 12px; cursor: pointer; }
        .logo h2 { margin: 0; font-size: 20px; letter-spacing: 1px; }
        
        /* 按钮样式 */
        .admin-btn { background: var(--cyan); color: #000; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; display: none; margin-left: 10px; }
        .btn-group { display: flex; }

        /* 卡片网格 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; border: 1px solid #2D3748; overflow: hidden; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); border-color: var(--cyan); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; background: #000; }
        .card-info { padding: 15px; }
        .card-title { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: #CBD5E0; }
        
        /* 复制按钮 */
        .copy-btn { width: 100%; padding: 10px; background: rgba(79, 209, 197, 0.1); color: var(--cyan); border: 1px solid var(--cyan); border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .copy-btn:hover { background: var(--cyan); color: #000; }
        
        /* 录入弹窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(5px); }
        .modal-content { background: #1A202C; width: 90%; max-width: 450px; margin: 50px auto; padding: 30px; border-radius: 15px; border: 1px solid var(--cyan); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #2D3748; border-radius: 8px; box-sizing: border-box; }
        .save-btn { width: 100%; padding: 15px; background: var(--cyan); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="logo" onclick="login()">
            <h2>林老师的提示词库</h2>
        </div>
        <div class="btn-group">
            <button id="addBtn" class="admin-btn" onclick="showModal()">+ 添加案例</button>
            <button id="expBtn" class="admin-btn" style="background:#fff" onclick="exportData()">备份数据</button>
        </div>
    </div>

    <div id="list" class="grid"></div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--cyan)">录入新提示词</h3>
            <input type="text" id="name" placeholder="案例名称 (如: 真人转Q版公仔)">
            <input type="text" id="img" placeholder="封面图片链接">
            <textarea id="prompt" rows="5" placeholder="在此粘贴 AI 提示词..."></textarea>
            <button class="save-btn" onclick="saveData()">确认发布</button>
            <button onclick="closeModal()" style="width:100%; background:none; color:#718096; border:none; margin-top:15px; cursor:pointer">取消返回</button>
        </div>
    </div>

    <script>
        let db = [];
        let isAdmin = false;

        // 核心：自动读取云端备份或本地缓存
        async function init() {
            try {
                const res = await fetch('ai_data.json');
                if (res.ok) {
                    db = await res.json();
                } else {
                    db = JSON.parse(localStorage.getItem('lin_teacher_db')) || [];
                }
            } catch (e) {
                db = JSON.parse(localStorage.getItem('lin_teacher_db')) || [];
            }
            render();
        }

        function render() {
            const list = document.getElementById('list');
            if (db.length === 0) {
                list.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 100px 0; color: #4A5568;">
                    <p>当前词库为空</p>
                    <p style="font-size:12px">点击左上角标题登录 (密码 lin888)</p>
                </div>`;
                return;
            }
            list.innerHTML = '';
            db.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${item.img}" onerror="this.src='https://via.placeholder.com/200?text=图片失效'">
                    <div class="card-info">
                        <div class="card-title">${item.name}</div>
                        <button class="copy-btn" onclick="copyPrompt('${encodeURIComponent(item.prompt)}')">复制提示词</button>
                        ${isAdmin ? `<div onclick="del(${i})" style="color:#E53E3E; font-size:12px; margin-top:15px; text-align:center; cursor:pointer">删除此项</div>` : ''}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function login() {
            if (prompt("请输入管理员密码") === "lin888") {
                isAdmin = true;
                document.querySelectorAll('.admin-btn').forEach(b => b.style.display = 'block');
                render();
                alert("登录成功，您可以开始录入或备份了");
            }
        }

        function showModal() { document.getElementById('myModal').style.display = 'block'; }
        function closeModal() { document.getElementById('myModal').style.display = 'none'; }

        function saveData() {
            const name = document.getElementById('name').value;
            const img = document.getElementById('img').value;
            const promptStr = document.getElementById('prompt').value;
            if (!name || !img || !promptStr) return alert("请填写完整");
            
            db.push({ name, img, prompt: promptStr });
            localStorage.setItem('lin_teacher_db', JSON.stringify(db));
            closeModal();
            render();
            // 清空输入框
            document.getElementById('name').value = '';
            document.getElementById('img').value = '';
            document.getElementById('prompt').value = '';
        }

        function del(i) { if (confirm("确定删除吗？")) { db.splice(i, 1); localStorage.setItem('lin_teacher_db', JSON.stringify(db)); render(); } }

        function copyPrompt(s) {
            const t = document.createElement('textarea');
            t.value = decodeURIComponent(s); document.body.appendChild(t);
            t.select(); document.execCommand('copy'); document.body.removeChild(t);
            alert("✅ 提示词已复制");
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "ai_data.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        init();
    </script>
</body>
</html>
